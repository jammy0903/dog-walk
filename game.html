<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>강아지 산책 — 타자로 걷기 · Dog Walk</title>
    <style>
      :root {
        --ink: #4a4036;
        --brown: #b07a4a;
        --coin: #d9a022;
        --paper: #fbf6ee;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, "Segoe UI", sans-serif;
        background: var(--paper);
        color: var(--ink);
        text-align: center;
        padding: 24px 16px 36px;
        user-select: none;
        min-height: 100vh;
        position: relative;
      }
      h1 { font-size: 16px; margin: 0 0 4px; letter-spacing: 1px; }
      .sub { font-size: 11px; color: #a99c8c; margin-bottom: 18px; }

      /* 강아지(옆모습) + 착용한 꾸미기 + 배경 무대 */
      .stage {
        position: relative;
        width: 100%;
        height: 162px;
        margin: 0 auto 14px;
        display: grid;
        place-items: end center; /* 발이 바닥에 닿게(포즈 바뀌어도 바닥 고정) */
        overflow: hidden;
        border-radius: 14px;
      }
      .dog {
        position: relative;
        z-index: 1; /* 배경 위로 */
        max-height: 140px;
        max-width: 100%;
        width: auto;
        height: auto;
        display: block;
        transform-origin: 50% 100%; /* 발 기준으로 흔들/숨쉬기 */
        filter: drop-shadow(0 6px 5px rgba(0, 0, 0, 0.12));
      }

      /* ── 배경 무대 테마 (사이드패널 전용 모드에서 선택) ── */
      .stage.bg-flower {
        background: linear-gradient(180deg, #cdeeff 0%, #e8f8ff 52%, #7ec850 52%, #5fb33f 100%);
      }
      .stage.bg-flower::after {
        content: "🌷      🌼       🌸      🌻      🌷";
        position: absolute;
        bottom: 2px; left: 0; right: 0;
        text-align: center;
        font-size: 16px;
        z-index: 0;
      }
      .stage.bg-road {
        background: linear-gradient(180deg, #dfe7ee 0%, #cfd8df 40%, #70767d 40%, #565c63 100%);
      }
      .stage.bg-road::after {
        content: "";
        position: absolute;
        left: 0; right: 0; bottom: 16px; height: 4px;
        background: repeating-linear-gradient(90deg, #f4d23a 0 22px, transparent 22px 42px);
        z-index: 0;
      }
      .stage.bg-excel {
        background:
          repeating-linear-gradient(180deg, transparent 0 23px, #dce0e6 23px 24px),
          repeating-linear-gradient(90deg, transparent 0 39px, #dce0e6 39px 40px),
          #fff;
      }
      .stage.bg-excel::before {
        content: "A      B      C      D      E";
        position: absolute;
        top: 0; left: 0; right: 0; height: 18px;
        background: #f1f3f4;
        border-bottom: 1px solid #c8ccd2;
        font: 11px ui-monospace, monospace;
        color: #8a8f96;
        line-height: 18px;
        padding-left: 26px;
        z-index: 0;
      }
      .stage.bg-chrome {
        background: #f1f3f4;
      }
      body[data-lang="en"] .stage.bg-chrome::before { content: "🔍  Search or enter URL"; }
      .stage.bg-chrome::before {
        content: "🔍  검색어 또는 URL 입력";
        position: absolute;
        top: 20px; left: 50%;
        transform: translateX(-50%);
        width: 80%; height: 32px;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.12);
        font: 12px system-ui;
        color: #9aa0a6;
        display: flex;
        align-items: center;
        padding-left: 16px;
        z-index: 0;
      }
      .dog.breath {
        animation: breathe 3.6s ease-in-out infinite;
      }
      .dog.walking {
        animation: walkbob 0.46s ease-in-out infinite;
      }
      @keyframes breathe {
        0%, 100% { transform: translateY(0) scale(1, 1); }
        50% { transform: translateY(-2px) scale(1.01, 0.99); }
      }
      @keyframes walkbob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }

      .big {
        font-size: 38px;
        font-weight: 700;
        color: var(--brown);
        font-variant-numeric: tabular-nums;
      }
      .label { font-size: 11px; color: #a99c8c; margin: 2px 0 14px; }

      .wallet {
        display: flex;
        justify-content: center;
        gap: 18px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 4px;
      }
      .coin { font-size: 17px; font-weight: 600; color: var(--coin); font-variant-numeric: tabular-nums; }
      .keys { font-size: 12px; color: #b3a796; }

      button {
        border: 1px solid #e0d3bf;
        background: #fff;
        border-radius: 999px;
        padding: 8px 16px;
        font-size: 12px;
        color: var(--ink);
        cursor: pointer;
      }
      button:disabled { opacity: 0.4; cursor: default; }
      .exchange { margin: 12px auto 0; background: var(--brown); color: #fff; border-color: var(--brown); font-weight: 600; }

      .shop {
        max-width: 320px;
        margin: 24px auto 0;
        text-align: left;
        border-top: 1px solid #ece0cf;
        padding-top: 14px;
      }
      .shop h2 { font-size: 12px; color: #a99c8c; margin: 0 0 10px; text-align: center; letter-spacing: 1px; }
      .item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 7px 4px;
      }
      .item .ico { font-size: 22px; width: 28px; text-align: center; }
      .item .nm { flex: 1; font-size: 13px; }
      .item .pr { font-size: 12px; color: var(--coin); }
      .item button { padding: 5px 12px; font-size: 11px; }
      .item button.eq { background: var(--brown); color: #fff; border-color: var(--brown); }

      .settings { margin-top: 26px; font-size: 11px; color: #a99c8c; }
      .settings .seg { display: inline-flex; border: 1px solid #e0d3bf; border-radius: 999px; overflow: hidden; margin-top: 6px; }
      .settings .seg button { border: 0; padding: 6px 14px; }
      .settings .seg button.on { background: var(--brown); color: #fff; }
      .cloud { margin-top: 12px; font-size: 11px; color: var(--brown); }
      /* 언어 토글 (우상단) */
      #langToggle { position: absolute; top: 10px; right: 12px; z-index: 5;
        border: 1px solid #d8cdb6; background: #fff; color: var(--brown);
        font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 12px; cursor: pointer; }
      #langToggle:active { background: #efe7d6; }
    </style>
  </head>
  <body>
    <button id="langToggle" type="button" title="Language">EN</button>
    <h1 data-i18n="title">강아지 산책</h1>
    <div class="sub" data-i18n="sub">타자 한 글자·마우스 클릭 = 한 걸음</div>

    <div class="stage">
      <img class="dog breath" id="dog" src="assets/dog-rest.webp" alt="dog" draggable="false" />
    </div>

    <div class="big" id="steps">0</div>
    <div class="label" data-i18n="steps">걸음</div>

    <div class="wallet">
      <span class="coin">🦴 <span id="coins">0</span></span>
      <span class="keys">⌨ <span id="taps">0</span> <span data-i18n="keys">글자</span></span>
    </div>
    <button class="exchange" id="exchange" data-i18n="exchange">걸음 → 🦴 환전</button>

    <div class="shop">
      <h2 data-i18n="shop">🐕 강아지 상점</h2>
      <div id="items"></div>
    </div>

    <div class="settings">
      <div id="petSizeWrap">
        <span data-i18n="petSize">페이지 강아지 크기</span>
        <div style="margin-top: 6px">
          <input type="range" id="petSize" min="40" max="200" step="4" style="width: 70%; vertical-align: middle" />
          <span id="petSizeVal" style="font-size: 11px; color: #a99c8c"></span>
        </div>
      </div>
      <div id="bgPick" style="margin-top: 12px; display: none">
        <span data-i18n="bg">배경</span>
        <div class="seg" id="bgSeg">
          <button data-bg="flower" data-i18n="bgFlower">꽃밭</button>
          <button data-bg="road" data-i18n="bgRoad">도로</button>
          <button data-bg="excel" data-i18n="bgExcel">엑셀</button>
          <button data-bg="chrome" data-i18n="bgChrome">크롬</button>
        </div>
      </div>
      <div class="cloud" data-i18n="cloud">☁ 구글 계정에 자동 저장 (기기끼리 동기화)</div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
